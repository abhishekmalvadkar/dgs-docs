name: Generate Mermaid SVGs

on:
  push:
    branches: [develop]
    paths:
      - 'diagrams/*.mmd'
  workflow_dispatch:

jobs:
  generate-mermaid:
    if: "!contains(github.event.head_commit.message, 'Auto-generate SVGs from Mermaid')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Generate SVGs from .mmd files
        run: |
          mkdir -p assets
          for file in diagrams/*.mmd; do
            filename=$(basename "$file" .mmd)
            mmdc -i "$file" -o "assets/${filename}.svg"
          done

      - name: Commit and push generated SVGs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/*.svg
          git diff --cached --quiet || git commit -m "Auto-generate SVGs from Mermaid"
          git push
