name: Render Mermaid Diagrams as PNG

on:
  push:
    branches: [develop]
    paths:
      - 'diagrams/*.mmd'

  workflow_dispatch:  # allow manual run

jobs:
  render-diagrams:
    if: "!contains(github.event.head_commit.message, 'Auto-generate PNG diagrams from Mermaid')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create output directory
        run: mkdir -p assets

      - name: Render all Mermaid .mmd files to PNG using Docker
        run: |
          for file in diagrams/*.mmd; do
            filename=$(basename "$file" .mmd)
            echo "Rendering $file to assets/${filename}.png"
            docker run --rm -v "$PWD:/data" minlag/mermaid-cli \
              -i "/data/$file" -o "/data/assets/${filename}.png"
          done

      - name: Commit and push PNG diagrams
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/*.png
          git diff --cached --quiet || git commit -m "Auto-generate PNG diagrams from Mermaid"
          git push
